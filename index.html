<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IronLog">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>IronLog</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
[data-theme="dark"]{--bg:#0d0d0d;--s1:#141414;--s2:#1c1c1c;--s3:#252525;--border:#2e2e2e;--text:#f5f5f0;--muted:#666;--card-bg:#141414;--input-bg:#1c1c1c;--sheet-bg:#141414}
[data-theme="light"]{--bg:#f0ede8;--s1:#fff;--s2:#f5f2ed;--s3:#ece9e4;--border:#ddd;--text:#1a1a1a;--muted:#888;--card-bg:#fff;--input-bg:#f5f2ed;--sheet-bg:#fff}
:root{--push:#e85a2a;--pull:#2a8ce8;--legs:#2ae87a;--shoulder:#e8c12a;--cardio:#e82a8c;--accent:#e8e0d0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;font-size:15px}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;gap:4px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.06em;transition:color .2s}
.nav-btn.active{color:var(--text)}

/* SCREENS - flex column, fixed height */
.screen{position:fixed;inset:0;bottom:60px;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

.page-header{padding:48px 20px 12px;display:flex;justify-content:space-between;align-items:flex-end;flex-shrink:0}
.page-header h1{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;line-height:1}
.page-header .sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.theme-btn{background:var(--s2);border:1px solid var(--border);border-radius:16px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif}

/* DATE STRIP - fixed, no overlap */
.date-strip-wrap{flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg)}
.date-strip{display:flex;gap:8px;padding:10px 16px;overflow-x:auto}
.date-strip::-webkit-scrollbar{display:none}
.date-chip{display:flex;flex-direction:column;align-items:center;padding:8px 11px;border-radius:10px;border:1px solid var(--border);cursor:pointer;min-width:44px;gap:2px;flex-shrink:0;transition:all .15s}
.date-chip.today{border-color:var(--accent)}
.date-chip.selected{background:var(--accent);border-color:var(--accent)}
.date-chip.selected .dc-day,.date-chip.selected .dc-num{color:#1a1a1a}
.dc-day{font-size:9px;color:var(--muted);letter-spacing:.06em}
.dc-num{font-size:17px;font-family:'Bebas Neue',sans-serif;line-height:1.1}
.dc-dot{width:5px;height:5px;border-radius:50%;margin-top:1px}

/* SCROLL CONTENT - takes remaining space */
.scroll-content{flex:1;overflow-y:auto;padding:12px 16px 20px;min-height:0}
.scroll-content::-webkit-scrollbar{display:none}

/* CARDS */
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.card-title{font-size:11px;color:var(--muted);letter-spacing:.1em;margin-bottom:10px;font-family:'DM Mono',monospace}
.card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.add-card{border:1px dashed var(--border);border-radius:14px;padding:14px;margin-bottom:12px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer}

/* BADGES */
.badge{display:inline-flex;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;letter-spacing:.04em}
.b-push{background:#e85a2a22;color:var(--push);border:1px solid #e85a2a44}
.b-pull{background:#2a8ce822;color:var(--pull);border:1px solid #2a8ce844}
.b-legs{background:#2ae87a22;color:var(--legs);border:1px solid #2ae87a44}
.b-shoulder{background:#e8c12a22;color:var(--shoulder);border:1px solid #e8c12a44}
.b-cardio{background:#e82a8c22;color:var(--cardio);border:1px solid #e82a8c44}
.b-rest{background:#44444422;color:var(--muted);border:1px solid #44444444}

/* EXERCISES */
.ex-row{padding:10px 0;border-bottom:1px solid var(--border)}
.ex-row:last-child{border-bottom:none;padding-bottom:0}
.sets-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.set-chip{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-family:'DM Mono',monospace;font-size:12px}
.set-chip.pr{border-color:var(--shoulder);color:var(--shoulder)}

/* DIET */
.meal-blk{padding:10px 0;border-bottom:1px solid var(--border)}
.meal-blk:last-child{border-bottom:none}
.meal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.meal-nm{font-size:13px;font-weight:500;color:var(--accent)}
.meal-tm{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.mpills{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.mpill{font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:20px}
.mc{background:#e8c12a18;color:var(--shoulder)}.mp{background:#2a8ce818;color:var(--pull)}.mcb{background:#ffffff10;color:#aaa}

/* PLAN WEEK */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:10px 16px 6px;flex-shrink:0}
.wcell{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 3px;border-radius:10px;border:1px solid var(--border);cursor:pointer;background:var(--s1)}
.wcell:active{transform:scale(.93)}
.wd{font-size:8px;color:var(--muted)}
.wn{font-size:14px;font-family:'Bebas Neue',sans-serif}
.wb{width:18px;height:3px;border-radius:2px}
.wck{font-size:9px;color:var(--legs)}

/* PROGRESS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px}
.stat-v{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1}
.stat-l{font-size:10px;color:var(--muted);letter-spacing:.08em;margin-top:2px}
.vbw{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.vbl{font-size:11px;width:68px;flex-shrink:0}
.vb{flex:1;height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.vbf{height:100%;border-radius:3px}
.vbv{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);width:24px;text-align:right}
.pr-tbl{width:100%;border-collapse:collapse}
.pr-tbl th{font-size:10px;color:var(--muted);letter-spacing:.08em;padding:5px 6px;text-align:left;border-bottom:1px solid var(--border)}
.pr-tbl td{padding:8px 6px;border-bottom:1px solid var(--border);font-size:13px}
.pr-tbl tr:last-child td{border-bottom:none}

/* FAB */
.fab{position:fixed;bottom:72px;right:18px;width:50px;height:50px;background:var(--accent);border-radius:50%;border:none;color:#1a1a1a;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:flex-end}
.overlay.open{display:flex}
.sheet{background:var(--sheet-bg);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:16px 20px 44px}
.sheet::-webkit-scrollbar{display:none}
.sh{width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.sheet h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;margin-bottom:16px}

/* FORM */
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.fg label{font-size:11px;color:var(--muted);letter-spacing:.08em}
.fg input,.fg select,.fg textarea{background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:12px 14px;outline:none;width:100%;transition:border-color .2s;-webkit-appearance:none}
.fg input:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{resize:none;height:68px;line-height:1.5}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* TYPE / MEAL SELECTOR */
.tsel{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.topt{padding:11px 4px;border:1px solid var(--border);border-radius:10px;text-align:center;cursor:pointer;font-size:12px;font-weight:500;background:var(--input-bg);color:var(--muted);transition:all .2s}
.topt.s-push{border-color:var(--push);color:var(--push);background:#e85a2a18}
.topt.s-pull{border-color:var(--pull);color:var(--pull);background:#2a8ce818}
.topt.s-legs{border-color:var(--legs);color:var(--legs);background:#2ae87a18}
.topt.s-shoulder{border-color:var(--shoulder);color:var(--shoulder);background:#e8c12a18}
.topt.s-cardio{border-color:var(--cardio);color:var(--cardio);background:#e82a8c18}
.topt.s-rest{border-color:var(--muted);color:var(--muted);background:#55555518}
.topt.s-meal{border-color:var(--accent);color:var(--text);background:#e8e0d018}

/* EX BUILDER */
.exb{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
.exb-hdr{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.exi{background:var(--s3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:8px 12px;outline:none;flex:1;transition:border-color .2s}
.exi:focus{border-color:var(--accent)}
.sgh{display:grid;grid-template-columns:20px 1fr 1fr 28px;gap:6px;margin-bottom:4px}
.sgl{font-size:9px;color:var(--muted);letter-spacing:.05em;text-align:center}
.sgr{display:grid;grid-template-columns:20px 1fr 1fr 28px;gap:6px;align-items:center;margin-bottom:6px}
.sn{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;text-align:center}
.si{background:var(--s3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;padding:8px 4px;outline:none;text-align:center;width:100%;transition:border-color .2s}
.si:focus{border-color:var(--accent)}
.rmb{width:28px;height:28px;background:var(--s3);border:none;border-radius:6px;color:var(--muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.asb{background:transparent;border:1px dashed var(--border);border-radius:8px;padding:7px;width:100%;text-align:center;font-size:12px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:2px}
.aexb{background:transparent;border:1px dashed var(--border);border-radius:10px;padding:10px;width:100%;text-align:center;font-size:13px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:14px}

/* BUTTONS */
.bp{background:var(--accent);color:#1a1a1a;border:none;border-radius:10px;padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;width:100%;margin-bottom:8px}
.bg{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:12px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;width:100%;margin-bottom:6px}
.bd{background:transparent;color:#e82a2a;border:1px solid #e82a2a33;border-radius:10px;padding:12px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;width:100%}
.idel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:2px 5px;line-height:1}
.empty{padding:36px 20px;text-align:center;color:var(--muted);font-size:14px;line-height:2}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- TODAY SCREEN -->
<div class="screen active" id="sc-today">
  <div class="page-header">
    <div><h1>IRONLOG</h1><div class="sub" id="hdr-date"></div></div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☀ Light</button>
  </div>
  <div class="date-strip-wrap">
    <div class="date-strip" id="date-strip"></div>
  </div>
  <div class="scroll-content" id="today-body"></div>
</div>

<!-- PLAN SCREEN -->
<div class="screen" id="sc-plan">
  <div class="page-header"><div><h1>PLAN</h1><div class="sub">WEEKLY SCHEDULE</div></div></div>
  <div class="week-grid" id="week-grid"></div>
  <div class="scroll-content" id="plan-body"></div>
</div>

<!-- GAINS SCREEN -->
<div class="screen" id="sc-progress">
  <div class="page-header"><div><h1>GAINS</h1><div class="sub">STRENGTH & STATS</div></div></div>
  <div class="scroll-content" id="gains-body"></div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="tab('today')" id="nb-today"><span style="font-size:20px">◈</span>TODAY</button>
  <button class="nav-btn" onclick="tab('plan')" id="nb-plan"><span style="font-size:20px">▦</span>PLAN</button>
  <button class="nav-btn" onclick="tab('progress')" id="nb-progress"><span style="font-size:20px">▲</span>GAINS</button>
</div>
<button class="fab" id="fab" onclick="openFab()">+</button>

<!-- FAB CHOICE -->
<div class="overlay" id="ov-fab"><div class="sheet">
  <div class="sh"></div><h2>LOG</h2>
  <button class="bp" onclick="fabOpen('w')">💪 Log Workout</button>
  <button class="bp" style="background:var(--s3);color:var(--text)" onclick="fabOpen('d')">🥗 Log Meal</button>
  <button class="bg" onclick="co('ov-fab')">Cancel</button>
</div></div>

<!-- WORKOUT SHEET -->
<div class="overlay" id="ov-w"><div class="sheet">
  <div class="sh"></div><h2 id="w-title">LOG WORKOUT</h2>
  <div class="fg"><label>DATE</label><input type="date" id="w-date"></div>
  <div class="fg"><label>TYPE</label>
    <div class="tsel" id="w-tsel">
      <div class="topt" data-t="push" onclick="st('push','w')">PUSH</div>
      <div class="topt" data-t="pull" onclick="st('pull','w')">PULL</div>
      <div class="topt" data-t="legs" onclick="st('legs','w')">LEGS</div>
      <div class="topt" data-t="shoulder" onclick="st('shoulder','w')">SHOULDER</div>
      <div class="topt" data-t="cardio" onclick="st('cardio','w')">CARDIO</div>
      <div class="topt" data-t="rest" onclick="st('rest','w')">REST</div>
    </div>
  </div>
  <div id="w-exs">
    <div class="fg" style="margin-bottom:8px"><label>EXERCISES</label></div>
    <div id="w-exlist"></div>
    <button class="aexb" onclick="addEx('w')">+ Add Exercise</button>
  </div>
  <div id="w-cardio" class="hidden">
    <div class="frow">
      <div class="fg"><label>DURATION (min)</label><input type="number" id="w-cdur" placeholder="30"></div>
      <div class="fg"><label>TYPE</label><input type="text" id="w-ctype" placeholder="Running"></div>
    </div>
  </div>
  <div class="fg"><label>NOTES</label><textarea id="w-notes" placeholder="How did it feel?"></textarea></div>
  <button class="bp" onclick="saveW()">Save Workout</button>
  <button class="bg" onclick="co('ov-w')">Cancel</button>
  <button class="bd hidden" id="w-delbtn" onclick="delW()">Delete Workout</button>
</div></div>

<!-- DIET SHEET -->
<div class="overlay" id="ov-d"><div class="sheet">
  <div class="sh"></div><h2>LOG MEAL</h2>
  <div class="fg"><label>DATE</label><input type="date" id="d-date"></div>
  <div class="fg"><label>MEAL</label>
    <div class="tsel" id="d-msel">
      <div class="topt" data-m="Breakfast" onclick="sm('Breakfast')">Breakfast</div>
      <div class="topt" data-m="Lunch" onclick="sm('Lunch')">Lunch</div>
      <div class="topt" data-m="Dinner" onclick="sm('Dinner')">Dinner</div>
      <div class="topt" data-m="Eve Snack" onclick="sm('Eve Snack')">Snack</div>
      <div class="topt" data-m="Tea" onclick="sm('Tea')">Tea</div>
      <div class="topt" data-m="Munches" onclick="sm('Munches')">Munches</div>
    </div>
  </div>
  <div class="fg"><label>TIME</label><input type="time" id="d-time"></div>
  <div class="fg"><label>WHAT I ATE</label><textarea id="d-food" placeholder="e.g. 3 eggs, oats, banana, coffee"></textarea></div>
  <div class="frow">
    <div class="fg"><label>CALORIES</label><input type="number" id="d-cal" placeholder="optional"></div>
    <div class="fg"><label>PROTEIN (g)</label><input type="number" id="d-pro" placeholder="optional"></div>
  </div>
  <div class="frow">
    <div class="fg"><label>CARBS (g)</label><input type="number" id="d-carbs" placeholder="optional"></div>
    <div class="fg"><label>FATS (g)</label><input type="number" id="d-fats" placeholder="optional"></div>
  </div>
  <button class="bp" onclick="saveD()">Save Meal</button>
  <button class="bg" onclick="co('ov-d')">Cancel</button>
</div></div>

<!-- PLAN SHEET -->
<div class="overlay" id="ov-p"><div class="sheet">
  <div class="sh"></div><h2>PLAN DAY</h2>
  <div class="fg"><label>DATE</label><input type="date" id="p-date"></div>
  <div class="fg"><label>WORKOUT TYPE</label>
    <div class="tsel" id="p-tsel">
      <div class="topt" data-t="push" onclick="st('push','p')">PUSH</div>
      <div class="topt" data-t="pull" onclick="st('pull','p')">PULL</div>
      <div class="topt" data-t="legs" onclick="st('legs','p')">LEGS</div>
      <div class="topt" data-t="shoulder" onclick="st('shoulder','p')">SHOULDER</div>
      <div class="topt" data-t="cardio" onclick="st('cardio','p')">CARDIO</div>
      <div class="topt" data-t="rest" onclick="st('rest','p')">REST</div>
    </div>
  </div>
  <div id="p-exs">
    <div class="fg" style="margin-bottom:8px"><label>PLANNED EXERCISES (optional)</label></div>
    <div id="p-exlist"></div>
    <button class="aexb" onclick="addEx('p')">+ Add Exercise</button>
  </div>
  <div class="fg"><label>NOTES</label><textarea id="p-notes" placeholder="Focus points, targets..."></textarea></div>
  <button class="bp" onclick="saveP()">Save Plan</button>
  <button class="bg" onclick="co('ov-p')">Cancel</button>
  <button class="bd hidden" id="p-delbtn" onclick="delP()">Delete Plan</button>
</div></div>

<script>
let DB = JSON.parse(localStorage.getItem('ilog')||'{"w":{},"m":{},"p":{},"pr":{}}');
let selDate = td(), curTab = 'today';
let wT=null, pT=null, dM=null, wEditDate=null, pEditDate=null;
let wEx=[], pEx=[];

function sv(){ localStorage.setItem('ilog', JSON.stringify(DB)); }
function td(){ return new Date().toISOString().slice(0,10); }
function fdt(s){ return new Date(s+'T12:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}); }
function tc(t){ return {push:'#e85a2a',pull:'#2a8ce8',legs:'#2ae87a',shoulder:'#e8c12a',cardio:'#e82a8c',rest:'#555'}[t]||'#666'; }

// THEME
function toggleTheme(){
  const h=document.documentElement, d=h.dataset.theme==='dark';
  h.dataset.theme=d?'light':'dark';
  document.getElementById('theme-btn').textContent=d?'🌙 Dark':'☀ Light';
  localStorage.setItem('iltheme',h.dataset.theme);
}
(()=>{ const t=localStorage.getItem('iltheme')||'dark'; document.documentElement.dataset.theme=t; setTimeout(()=>{ const b=document.getElementById('theme-btn'); if(b) b.textContent=t==='dark'?'☀ Light':'🌙 Dark'; },0); })();

// TABS
function tab(t){
  curTab=t;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sc-'+t).classList.add('active');
  document.getElementById('nb-'+t).classList.add('active');
  const fab=document.getElementById('fab');
  fab.style.display=t==='progress'?'none':'flex';
  fab.onclick=t==='plan'?openPlan:openFab;
  if(t==='today') rToday();
  else if(t==='plan') rPlan();
  else rGains();
}

// DATE STRIP
function rStrip(){
  const el=document.getElementById('date-strip'), now=new Date();
  let h='';
  for(let i=-3;i<=6;i++){
    const d=new Date(now); d.setDate(now.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    const isTd=ds===td(), isSel=ds===selDate;
    const w=DB.w[ds], m=DB.m[ds];
    const dot=w?tc(w.type):(m&&m.length?'#777':'transparent');
    h+=`<div class="date-chip${isTd?' today':''}${isSel?' selected':''}" onclick="pickDate('${ds}')">
      <div class="dc-day">${['S','M','T','W','T','F','S'][d.getDay()]}</div>
      <div class="dc-num">${d.getDate()}</div>
      <div class="dc-dot" style="background:${isSel?'transparent':dot}"></div>
    </div>`;
  }
  el.innerHTML=h;
}
function pickDate(ds){ selDate=ds; rStrip(); rTodayBody(); document.getElementById('hdr-date').textContent=fdt(ds).toUpperCase(); }

// TODAY
function rToday(){ document.getElementById('hdr-date').textContent=fdt(selDate).toUpperCase(); rStrip(); rTodayBody(); }

function rTodayBody(){
  const el=document.getElementById('today-body');
  const w=DB.w[selDate], meals=DB.m[selDate]||[], plan=DB.p[selDate];
  let h='';

  // Plan hint
  if(plan&&!w){
    let pex='';
    if(plan.ex&&plan.ex.length) pex=`<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px"><div style="font-size:10px;color:var(--muted);letter-spacing:.08em;margin-bottom:5px">PLANNED EXERCISES</div>${plan.ex.map(e=>`<div style="font-size:13px;color:var(--muted);padding:2px 0">· ${e.n}${e.sets&&e.sets.length?' — '+e.sets.length+' sets':''}</div>`).join('')}</div>`;
    h+=`<div class="card" style="border-color:${tc(plan.type)}55">
      <div class="card-title">PLANNED</div>
      <span class="badge b-${plan.type}">${plan.type.toUpperCase()}</span>
      ${plan.notes?`<div style="font-size:13px;color:var(--muted);margin-top:8px">${plan.notes}</div>`:''}
      ${pex}
      <button class="bp" style="margin-top:12px;margin-bottom:0" onclick="logFromPlan()">Log This Workout →</button>
    </div>`;
  }

  // Workout
  if(w){
    let exh='';
    if(w.type==='cardio'){ exh=`<div style="font-size:13px;color:var(--muted);margin-top:8px">${w.cdur?w.cdur+' min — ':''}${w.ctype||''}</div>`; }
    else if(w.ex&&w.ex.length){
      exh=w.ex.map(e=>{
        const pr=DB.pr[e.n]||0, mx=e.sets.length?Math.max(...e.sets.map(s=>+s.kg||0)):0;
        const newPR=mx>0&&mx>pr;
        return `<div class="ex-row">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="font-size:15px;font-weight:500">${e.n}</div>
            ${newPR?`<span style="font-size:10px;background:#e8c12a22;color:var(--shoulder);padding:2px 7px;border-radius:10px;font-family:'DM Mono',monospace">PR 🏆</span>`:''}
          </div>
          ${pr?`<div style="font-size:11px;color:var(--shoulder);font-family:'DM Mono',monospace;margin-top:2px">Best: ${pr}kg</div>`:''}
          <div class="sets-row">${e.sets.map(s=>`<span class="set-chip${newPR&&+s.kg?' pr':''}">${s.kg?s.kg+'kg × ':''}${s.r} reps</span>`).join('')}</div>
        </div>`;
      }).join('');
    }
    h+=`<div class="card">
      <div class="card-hdr"><div class="card-title">WORKOUT</div>
        <div style="display:flex;gap:4px">
          <button class="idel" onclick="editW('${selDate}')">✎</button>
          <button class="idel" onclick="if(confirm('Delete workout?')){delete DB.w['${selDate}'];sv();rTodayBody();}">×</button>
        </div>
      </div>
      <span class="badge b-${w.type}">${w.type.toUpperCase()}</span>
      ${exh}
      ${w.notes?`<div style="font-size:12px;color:var(--muted);margin-top:10px;font-style:italic">${w.notes}</div>`:''}
    </div>`;
  } else if(!plan) h+=`<div class="add-card" onclick="openW()">+ Log workout for this day</div>`;

  // Diet
  if(meals.length){
    const ord=['Breakfast','Lunch','Dinner','Eve Snack','Tea','Munches'];
    const srt=[...meals].sort((a,b)=>ord.indexOf(a.meal)-ord.indexOf(b.meal));
    const totC=meals.reduce((s,m)=>s+(+m.cal||0),0), totP=meals.reduce((s,m)=>s+(+m.pro||0),0);
    h+=`<div class="card">
      <div class="card-hdr"><div class="card-title">DIET</div>
        ${totC?`<div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)">${totC}kcal · ${totP}g P</div>`:''}
      </div>
      ${srt.map(m=>`<div class="meal-blk">
        <div class="meal-hdr">
          <div class="meal-nm">${m.meal}</div>
          <div style="display:flex;align-items:center;gap:5px">
            ${m.time?`<div class="meal-tm">${m.time}</div>`:''}
            <button class="idel" onclick="if(confirm('Delete meal?')){DB.m['${selDate}']=DB.m['${selDate}'].filter(x=>x.id!=='${m.id}');sv();rTodayBody();}">×</button>
          </div>
        </div>
        <div style="font-size:13px;color:var(--muted);line-height:1.6">${m.food}</div>
        ${(m.cal||m.pro||m.carbs||m.fats)?`<div class="mpills">
          ${m.cal?`<span class="mpill mc">${m.cal}kcal</span>`:''}
          ${m.pro?`<span class="mpill mp">${m.pro}g P</span>`:''}
          ${m.carbs?`<span class="mpill mcb">${m.carbs}g C</span>`:''}
          ${m.fats?`<span class="mpill" style="background:#55555518;color:#888">${m.fats}g F</span>`:''}
        </div>`:''}
      </div>`).join('')}
      <div class="add-card" style="margin-top:8px;margin-bottom:0" onclick="openD()">+ Add meal</div>
    </div>`;
  } else h+=`<div class="add-card" onclick="openD()">+ Log meals for this day</div>`;

  el.innerHTML=h||'<div class="empty">Nothing logged yet.<br>Tap + to get started.</div>';
}

// PLAN
function rPlan(){
  const now=new Date(), g=document.getElementById('week-grid');
  let h='';
  for(let i=0;i<7;i++){
    const d=new Date(now); d.setDate(now.getDate()-now.getDay()+i);
    const ds=d.toISOString().slice(0,10);
    const p=DB.p[ds], w=DB.w[ds];
    const col=w?tc(w.type):(p?tc(p.type)+'88':'var(--border)');
    h+=`<div class="wcell" onclick="openPlanFor('${ds}')">
      <div class="wd">${['S','M','T','W','T','F','S'][d.getDay()]}</div>
      <div class="wn" style="color:${ds===td()?'var(--accent)':'var(--text)'}">${d.getDate()}</div>
      <div class="wb" style="background:${col}"></div>
      ${w?`<div class="wck">✓</div>`:''}
    </div>`;
  }
  g.innerHTML=h;

  const pb=document.getElementById('plan-body');
  const all=Object.entries(DB.p).sort(([a],[b])=>a.localeCompare(b));
  const upcoming=all.filter(([d])=>d>=td());
  const past=all.filter(([d])=>d<td()).slice(-3).reverse();
  const show=[...upcoming,...past];
  if(!show.length){ pb.innerHTML='<div class="empty">No plans yet.<br>Tap a day above or + to plan.</div>'; return; }

  pb.innerHTML=show.map(([ds,p])=>{
    const w=DB.w[ds], isPast=ds<td();
    const pexh=p.ex&&p.ex.length?`<div style="margin-top:7px;font-size:12px;color:var(--muted)">${p.ex.map(e=>`· ${e.n}`).join('  ')}</div>`:'';
    const doneh=w?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
      <div style="font-size:10px;color:var(--legs);letter-spacing:.07em;margin-bottom:5px">✓ COMPLETED</div>
      <span class="badge b-${w.type}" style="font-size:11px">${w.type.toUpperCase()}</span>
      ${w.ex&&w.ex.length?`<div style="font-size:12px;color:var(--muted);margin-top:5px">${w.ex.length} exercises logged</div>`:''}
    </div>`:'';
    return `<div class="card" style="opacity:${isPast&&!w?'.55':'1'};border-color:${tc(p.type)}${w?'77':'33'}">
      <div class="card-hdr">
        <div style="flex:1">
          <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:5px">${fdt(ds).toUpperCase()}</div>
          <span class="badge b-${p.type}">${p.type.toUpperCase()}</span>
          ${p.notes?`<div style="font-size:12px;color:var(--muted);margin-top:6px">${p.notes}</div>`:''}
          ${pexh}${doneh}
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;margin-left:8px">
          <button class="idel" onclick="openPlanFor('${ds}')">✎</button>
          <button class="idel" onclick="if(confirm('Delete plan?')){delete DB.p['${ds}'];sv();rPlan();rTodayBody();}">×</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// GAINS
function rGains(){
  const el=document.getElementById('gains-body');
  const allW=Object.entries(DB.w).sort(([a],[b])=>a.localeCompare(b));
  if(!allW.length){ el.innerHTML='<div class="empty">Log your first workout<br>to see gains here. 💪</div>'; return; }
  let str=0; const d=new Date();
  for(;;){ const ds=d.toISOString().slice(0,10); if(DB.w[ds]){str++;d.setDate(d.getDate()-1);}else break; }
  const tc2={push:0,pull:0,legs:0,shoulder:0,cardio:0,rest:0};
  allW.forEach(([,w])=>{ if(tc2[w.type]!==undefined) tc2[w.type]++; });
  const mx=Math.max(...Object.values(tc2),1);
  const prs=Object.entries(DB.pr||{}).sort(([,a],[,b])=>b-a).slice(0,15);

  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--push);line-height:1">${str}</div>
      <div><div style="font-size:11px;color:var(--muted);letter-spacing:.06em">DAY STREAK 🔥</div><div style="font-size:14px;font-weight:500;margin-top:2px">${allW.length} total sessions</div></div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-v" style="color:var(--push)">${tc2.push}</div><div class="stat-l">PUSH</div></div>
      <div class="stat-card"><div class="stat-v" style="color:var(--pull)">${tc2.pull}</div><div class="stat-l">PULL</div></div>
      <div class="stat-card"><div class="stat-v" style="color:var(--legs)">${tc2.legs}</div><div class="stat-l">LEGS</div></div>
      <div class="stat-card"><div class="stat-v" style="color:var(--shoulder)">${tc2.shoulder}</div><div class="stat-l">SHOULDER</div></div>
    </div>
    <div class="card">
      <div class="card-title">VOLUME SPLIT</div>
      ${['push','pull','legs','shoulder','cardio'].map(t=>`<div class="vbw">
        <div class="vbl" style="color:${tc(t)}">${t.toUpperCase()}</div>
        <div class="vb"><div class="vbf" style="width:${(tc2[t]/mx*100).toFixed(0)}%;background:${tc(t)}"></div></div>
        <div class="vbv">${tc2[t]}x</div>
      </div>`).join('')}
    </div>
    ${prs.length?`<div class="card"><div class="card-title">PERSONAL RECORDS 🏆</div>
      <table class="pr-tbl"><tr><th>EXERCISE</th><th>BEST</th></tr>
        ${prs.map(([ex,kg])=>`<tr><td style="color:var(--text)">${ex}</td><td style="font-family:'DM Mono',monospace;color:var(--shoulder)">${kg}kg</td></tr>`).join('')}
      </table></div>`:''}
    <div class="card"><div class="card-title">RECENT SESSIONS</div>
      ${allW.slice(-8).reverse().map(([ds,w])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
        <div><div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:4px">${fdt(ds).toUpperCase()}</div>
          <span class="badge b-${w.type}" style="font-size:11px">${w.type.toUpperCase()}</span></div>
        ${w.ex?`<div style="font-size:12px;color:var(--muted)">${w.ex.length} ex</div>`:''}
      </div>`).join('')}
    </div>`;
}

// EXERCISE BUILDER
function addEx(ctx){
  (ctx==='w'?wEx:pEx).push({n:'',sets:[{kg:'',r:''}]});
  rExList(ctx);
}
function rExList(ctx){
  const arr=ctx==='w'?wEx:pEx, el=document.getElementById(ctx+'-exlist');
  if(!arr.length){el.innerHTML='';return;}
  el.innerHTML=arr.map((e,ei)=>`
    <div class="exb">
      <div class="exb-hdr">
        <input class="exi" type="text" placeholder="Exercise name" value="${e.n}"
          oninput="${ctx}Ex[${ei}].n=this.value">
        <button class="rmb" onclick="rmEx('${ctx}',${ei})">×</button>
      </div>
      <div class="sgh"><div class="sgl">#</div><div class="sgl">KG</div><div class="sgl">REPS</div><div></div></div>
      ${e.sets.map((s,si)=>`
        <div class="sgr">
          <div class="sn">${si+1}</div>
          <input class="si" type="number" placeholder="kg" value="${s.kg}" oninput="${ctx}Ex[${ei}].sets[${si}].kg=this.value">
          <input class="si" type="number" placeholder="0" value="${s.r}" oninput="${ctx}Ex[${ei}].sets[${si}].r=this.value">
          <button class="rmb" onclick="rmSet('${ctx}',${ei},${si})">×</button>
        </div>`).join('')}
      <button class="asb" onclick="addSet('${ctx}',${ei})">+ Set</button>
    </div>`).join('');
}
function rmEx(ctx,ei){ (ctx==='w'?wEx:pEx).splice(ei,1); rExList(ctx); }
function addSet(ctx,ei){ (ctx==='w'?wEx:pEx)[ei].sets.push({kg:'',r:''}); rExList(ctx); }
function rmSet(ctx,ei,si){ const a=ctx==='w'?wEx:pEx; if(a[ei].sets.length>1){a[ei].sets.splice(si,1);rExList(ctx);} }

// TYPE SELECT
function st(t,ctx){
  if(ctx==='w') wT=t; else pT=t;
  document.querySelectorAll('#'+(ctx==='w'?'w':'p')+'-tsel .topt').forEach(el=>el.className='topt'+(el.dataset.t===t?' s-'+t:''));
  if(ctx==='w'){
    document.getElementById('w-exs').classList.toggle('hidden',t==='cardio'||t==='rest');
    document.getElementById('w-cardio').classList.toggle('hidden',t!=='cardio');
  }
  if(ctx==='p') document.getElementById('p-exs').classList.toggle('hidden',t==='rest');
}

// MEAL SELECT
function sm(m){
  dM=m;
  document.querySelectorAll('#d-msel .topt').forEach(el=>el.className='topt'+(el.dataset.m===m?' s-meal':''));
}

// WORKOUT
function openFab(){ oo('ov-fab'); }
function fabOpen(w){ co('ov-fab'); if(w==='w') openW(); else openD(); }
function openW(){
  wEditDate=null; wT=null; wEx=[];
  document.getElementById('w-title').textContent='LOG WORKOUT';
  document.getElementById('w-date').value=selDate;
  ['w-notes','w-cdur','w-ctype'].forEach(id=>document.getElementById(id).value='');
  document.querySelectorAll('#w-tsel .topt').forEach(el=>el.className='topt');
  document.getElementById('w-exs').classList.remove('hidden');
  document.getElementById('w-cardio').classList.add('hidden');
  document.getElementById('w-delbtn').classList.add('hidden');
  rExList('w'); oo('ov-w');
}
function editW(ds){
  const w=DB.w[ds]; if(!w) return;
  wEditDate=ds; wT=w.type; wEx=w.ex?JSON.parse(JSON.stringify(w.ex)):[];
  document.getElementById('w-title').textContent='EDIT WORKOUT';
  document.getElementById('w-date').value=ds;
  document.getElementById('w-notes').value=w.notes||'';
  document.getElementById('w-cdur').value=w.cdur||'';
  document.getElementById('w-ctype').value=w.ctype||'';
  document.querySelectorAll('#w-tsel .topt').forEach(el=>el.className='topt'+(el.dataset.t===wT?' s-'+wT:''));
  document.getElementById('w-exs').classList.toggle('hidden',wT==='cardio'||wT==='rest');
  document.getElementById('w-cardio').classList.toggle('hidden',wT!=='cardio');
  document.getElementById('w-delbtn').classList.remove('hidden');
  rExList('w'); oo('ov-w');
}
function logFromPlan(){
  const p=DB.p[selDate]; if(!p) return;
  wEditDate=null; wT=p.type; wEx=p.ex?JSON.parse(JSON.stringify(p.ex)):[];
  document.getElementById('w-title').textContent='LOG WORKOUT';
  document.getElementById('w-date').value=selDate;
  document.getElementById('w-notes').value='';
  document.querySelectorAll('#w-tsel .topt').forEach(el=>el.className='topt'+(el.dataset.t===wT?' s-'+wT:''));
  document.getElementById('w-exs').classList.toggle('hidden',wT==='cardio'||wT==='rest');
  document.getElementById('w-cardio').classList.toggle('hidden',wT!=='cardio');
  document.getElementById('w-delbtn').classList.add('hidden');
  rExList('w'); oo('ov-w');
}
function saveW(){
  const date=document.getElementById('w-date').value;
  if(!date||!wT){alert('Select date and type');return;}
  const w={type:wT,notes:document.getElementById('w-notes').value};
  if(wT==='cardio'){w.cdur=document.getElementById('w-cdur').value;w.ctype=document.getElementById('w-ctype').value;}
  else if(wT!=='rest'){
    w.ex=wEx.filter(e=>e.n.trim());
    w.ex.forEach(e=>{ const mx=Math.max(...e.sets.map(s=>+s.kg||0)); if(mx>0&&mx>(DB.pr[e.n]||0)) DB.pr[e.n]=mx; });
  }
  DB.w[date]=w; sv(); co('ov-w'); rTodayBody(); rStrip();
  if(curTab==='plan') rPlan();
  if(curTab==='progress') rGains();
}
function delW(){
  if(wEditDate&&confirm('Delete workout?')){ delete DB.w[wEditDate]; sv(); co('ov-w'); rTodayBody(); rStrip(); }
}

// DIET
function openD(){
  dM=null;
  document.getElementById('d-date').value=selDate;
  ['d-time','d-food','d-cal','d-pro','d-carbs','d-fats'].forEach(id=>document.getElementById(id).value='');
  document.querySelectorAll('#d-msel .topt').forEach(el=>el.className='topt');
  oo('ov-d');
}
function saveD(){
  const date=document.getElementById('d-date').value, food=document.getElementById('d-food').value.trim();
  if(!date||!dM||!food){alert('Select date, meal type, and enter food');return;}
  if(!DB.m[date]) DB.m[date]=[];
  DB.m[date].push({id:Date.now().toString(),meal:dM,time:document.getElementById('d-time').value,food,
    cal:document.getElementById('d-cal').value,pro:document.getElementById('d-pro').value,
    carbs:document.getElementById('d-carbs').value,fats:document.getElementById('d-fats').value});
  sv(); co('ov-d'); rTodayBody(); rStrip();
}

// PLAN
function openPlan(){ openPlanFor(selDate); }
function openPlanFor(ds){
  pEditDate=ds; pT=null;
  const p=DB.p[ds];
  pEx=p&&p.ex?JSON.parse(JSON.stringify(p.ex)):[];
  document.getElementById('p-date').value=ds;
  document.getElementById('p-notes').value=p?p.notes||'':'';
  document.querySelectorAll('#p-tsel .topt').forEach(el=>el.className='topt'+(p&&el.dataset.t===p.type?' s-'+p.type:''));
  if(p){pT=p.type;}
  document.getElementById('p-exs').classList.toggle('hidden',pT==='rest');
  document.getElementById('p-delbtn').classList.toggle('hidden',!p);
  rExList('p'); oo('ov-p');
}
function saveP(){
  const date=document.getElementById('p-date').value;
  if(!date||!pT){alert('Select date and type');return;}
  DB.p[date]={type:pT,notes:document.getElementById('p-notes').value,ex:pEx.filter(e=>e.n.trim())};
  sv(); co('ov-p'); rPlan();
  if(curTab==='today') rTodayBody();
}
function delP(){
  if(pEditDate&&confirm('Delete plan?')){ delete DB.p[pEditDate]; sv(); co('ov-p'); rPlan(); rTodayBody(); }
}

// OVERLAY
function oo(id){ document.getElementById(id).classList.add('open'); }
function co(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); }));

// INIT
rToday();
if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
</script>
</body>
</html>
